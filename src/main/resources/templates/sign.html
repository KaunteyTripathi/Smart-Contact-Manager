<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::Layout(~{::section})}">

<section class="signup-section py-4">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-6 col-lg-7 col-md-9 col-12">

        <div class="login-card p-4">

          <!-- MESSAGE -->
          <div th:if="${message}"
               th:classappend="${message.type}"
               class="alert">
            <p th:text="${message.content}"></p>
          </div>

          <!-- LOTTIE -->
          <div class="d-flex justify-content-center mb-3">
            <dotlottie-wc
              src="https://lottie.host/fbd2f535-9383-4c30-baba-dbb0ca38a8cb/BlX67JDijy.lottie"
              style="width:180px;height:180px"
              autoplay loop>
            </dotlottie-wc>
          </div>

          <h2 class="text-center mb-3">Create Account</h2>

          <form th:action="@{/do_register}"
                th:object="${user}"
                method="post">

            <!-- NAME -->
            <div class="mb-3 position-relative">
              <i class="bi bi-person form-icon"></i>
              <input type="text" class="form-control"
                     name="name"
                     placeholder="Your Name"
                     required>
            </div>

            <!-- EMAIL -->
            <div class="mb-3 position-relative">
              <i class="bi bi-envelope form-icon"></i>
              <input type="email" class="form-control"
                     name="email"
                     placeholder="Your Email"
                     required>
            </div>

            <!-- PASSWORD -->
			<div class="mb-3 position-relative">
			  <i class="bi bi-lock form-icon"></i>
			  <input type="password"
			         class="form-control"
			         name="password"
			         placeholder="Your Password"
			         minlength="8"
			         pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*?&]{8,}$"
			         title="Password must be at least 8 characters and contain at least one letter and one number"
			         required>
			</div>

            <!-- TOOLBAR -->
            <div class="mb-2 d-flex flex-wrap gap-2 editor-toolbar"></div>

            <!-- EDITOR -->
            <div class="mb-3">
              <div contenteditable="true"
                   id="aboutEditor"
                   class="form-control editor-box"></div>
              <input type="hidden" name="about" id="aboutHidden">
            </div>

            <!-- TERMS -->
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" name="agreement">
              <label class="form-check-label">Accept terms</label>
            </div>

            <!-- BUTTONS -->
            <div class="row g-2">
              <div class="col-12 col-sm-6">
                <button class="btn btn-submit w-100">Submit</button>
              </div>
              <div class="col-12 col-sm-6">
                <button type="reset" class="btn btn-reset w-100">Reset</button>
              </div>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>

 </section>
</html>
